<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&amp;family=DM+Sans:wght@300;400&amp;display=swap');
    </style>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="#0C0C0C"/>

  <!-- Corner accents (from BCI modal motif) -->
  <line x1="20" y1="20" x2="50" y2="20" stroke="#C4A265" stroke-width="1" opacity="0.4"/>
  <line x1="20" y1="20" x2="20" y2="50" stroke="#C4A265" stroke-width="1" opacity="0.4"/>
  <line x1="380" y1="380" x2="350" y2="380" stroke="#C4A265" stroke-width="1" opacity="0.4"/>
  <line x1="380" y1="380" x2="380" y2="350" stroke="#C4A265" stroke-width="1" opacity="0.4"/>

  <!-- Central diamond frame (from hero element) rotated 45deg -->
  <rect x="140" y="140" width="120" height="120" fill="none" stroke="#C4A265" stroke-width="1" transform="rotate(45 200 200)" opacity="0.15"/>

  <!-- The "A" monogram — architectural, angular -->
  <g transform="translate(200, 185)">
    <!-- Left stroke of A -->
    <line x1="-42" y1="50" x2="0" y2="-50" stroke="#C4A265" stroke-width="2.5"/>
    <!-- Right stroke of A -->
    <line x1="42" y1="50" x2="0" y2="-50" stroke="#C4A265" stroke-width="2.5"/>
    <!-- Crossbar — slightly below center for elegance -->
    <line x1="-24" y1="12" x2="24" y2="12" stroke="#C4A265" stroke-width="1.5"/>
    <!-- Serif foot left -->
    <line x1="-48" y1="50" x2="-36" y2="50" stroke="#C4A265" stroke-width="1.5"/>
    <!-- Serif foot right -->
    <line x1="36" y1="50" x2="48" y2="50" stroke="#C4A265" stroke-width="1.5"/>
    <!-- Apex serif -->
    <line x1="-6" y1="-50" x2="6" y2="-50" stroke="#C4A265" stroke-width="1"/>
  </g>

  <!-- Wordmark below -->
  <text x="200" y="290" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="20" letter-spacing="0.15em" fill="#F0EDE8" font-weight="400">ARRASHA</text>
  <text x="200" y="315" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="20" letter-spacing="0.15em" fill="#C4A265" font-weight="400">JURISTS</text>
  <text x="200" y="335" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="8" letter-spacing="0.35em" fill="#666666" font-weight="300">LLP</text>
</svg>
