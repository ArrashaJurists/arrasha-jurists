<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&amp;family=DM+Sans:wght@300;400&amp;display=swap');
    </style>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="#0C0C0C"/>

  <!-- Abstract scales of justice — reduced to pure geometry -->
  <!-- Central pillar -->
  <line x1="200" y1="110" x2="200" y2="210" stroke="#C4A265" stroke-width="1.5"/>
  <!-- Balance beam -->
  <line x1="150" y1="130" x2="250" y2="130" stroke="#C4A265" stroke-width="1.5"/>
  <!-- Left pan (triangle, pointing down) -->
  <line x1="150" y1="130" x2="140" y2="160" stroke="#C4A265" stroke-width="1"/>
  <line x1="150" y1="130" x2="160" y2="160" stroke="#C4A265" stroke-width="1"/>
  <line x1="140" y1="160" x2="160" y2="160" stroke="#C4A265" stroke-width="1"/>
  <!-- Right pan (triangle, pointing down) -->
  <line x1="250" y1="130" x2="240" y2="160" stroke="#C4A265" stroke-width="1"/>
  <line x1="250" y1="130" x2="260" y2="160" stroke="#C4A265" stroke-width="1"/>
  <line x1="240" y1="160" x2="260" y2="160" stroke="#C4A265" stroke-width="1"/>
  <!-- Crown dot at apex -->
  <circle cx="200" cy="110" r="3" fill="#C4A265"/>
  <!-- Base -->
  <line x1="185" y1="210" x2="215" y2="210" stroke="#C4A265" stroke-width="1.5"/>
  <!-- Base foot -->
  <line x1="178" y1="215" x2="222" y2="215" stroke="#C4A265" stroke-width="1"/>

  <!-- Gold divider -->
  <line x1="170" y1="238" x2="230" y2="238" stroke="#C4A265" stroke-width="0.5" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="200" y="270" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="24" letter-spacing="0.12em" fill="#F0EDE8" font-weight="400">ARRASHA</text>
  <text x="200" y="298" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="24" letter-spacing="0.12em" fill="#C4A265" font-weight="400">JURISTS</text>
  <text x="200" y="320" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="8" letter-spacing="0.35em" fill="#666666" font-weight="300">LLP</text>
</svg>
